name: Publish articles

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_articles:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run zenn-qiita-sync
        uses: C-Naoki/zenn-qiita-sync@v1.0.0
        with:
          qiita-token: ${{ secrets.QIITA_TOKEN }}

      - name: Replace Zenn links with Qiita links
        run: bash scripts/replace-qiita-links.sh

      - name: Publish updated Qiita articles
        run: |
          if git diff --quiet qiita/public/; then
            echo "No link changes to publish"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add qiita/public/
            git commit -m "Replace Zenn links with Qiita links"
            git push
            npm install -g @qiita/qiita-cli@v1.8.0
            qiita publish --all --root ./qiita
          fi
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
